<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#0B3D91"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1E7A3C"/>
    </marker>
  </defs>

  <rect width="1920" height="1080" fill="#FFFFFF"/>

  <!-- TÍTULO -->
  <text x="960" y="62" text-anchor="middle" font-size="38" font-weight="bold" fill="#0B3D91">Arquitetura Privacy-First</text>
  <text x="960" y="100" text-anchor="middle" font-size="21" font-style="italic" fill="#555555">O código vai até o dado. O dado nunca sai da máquina.</text>

  <!-- ===== TERRITÓRIO 1 — MÁQUINA DO USUÁRIO ===== -->
  <rect x="40" y="140" width="1140" height="880" rx="18" ry="18"
        fill="#EAF2FB" stroke="#0B3D91" stroke-width="3"/>
  <text x="70" y="180" font-size="24" font-weight="bold" fill="#0B3D91">MÁQUINA DO USUÁRIO</text>

  <!-- CSV -->
  <g>
    <path d="M85 240 L195 240 L215 260 L215 360 L85 360 Z"
          fill="#FFFFFF" stroke="#0B3D91" stroke-width="2"/>
    <path d="M195 240 L195 260 L215 260" fill="none" stroke="#0B3D91" stroke-width="2"/>
    <text x="150" y="295" text-anchor="middle" font-size="22" font-weight="bold" fill="#0B3D91">CSV</text>
    <text x="150" y="325" text-anchor="middle" font-size="14" fill="#0B3D91">arquivo local</text>
  </g>

  <!-- MCP Server cluster -->
  <rect x="270" y="220" width="610" height="430" rx="14" ry="14"
        fill="#FFFFFF" stroke="#0B3D91" stroke-width="2.5"/>
  <text x="295" y="255" font-size="22" font-weight="bold" fill="#0B3D91">MCP Server</text>
  <text x="465" y="255" font-size="16" font-style="italic" fill="#0B3D91">agente-dados-mcp</text>

  <!-- extrair_schema -->
  <rect x="305" y="290" width="240" height="80" rx="10" ry="10"
        fill="#EAF2FB" stroke="#0B3D91" stroke-width="1.8"/>
  <text x="425" y="338" text-anchor="middle" font-size="20" font-weight="bold" fill="#0B3D91">extrair_schema</text>

  <!-- detectar_PII -->
  <rect x="605" y="290" width="240" height="80" rx="10" ry="10"
        fill="#EAF2FB" stroke="#0B3D91" stroke-width="1.8"/>
  <text x="725" y="338" text-anchor="middle" font-size="20" font-weight="bold" fill="#0B3D91">detectar_PII</text>

  <!-- validar_AST -->
  <rect x="305" y="490" width="240" height="90" rx="10" ry="10"
        fill="#DFF1E0" stroke="#1E7A3C" stroke-width="3"/>
  <text x="425" y="535" text-anchor="middle" font-size="20" font-weight="bold" fill="#1E7A3C">validar_AST</text>
  <text x="425" y="562" text-anchor="middle" font-size="14" fill="#1E7A3C">defesa em profundidade</text>

  <!-- executar_código -->
  <rect x="605" y="490" width="240" height="90" rx="10" ry="10"
        fill="#EAF2FB" stroke="#0B3D91" stroke-width="1.8"/>
  <text x="725" y="540" text-anchor="middle" font-size="20" font-weight="bold" fill="#0B3D91">executar_código</text>

  <!-- Cliente MCP -->
  <rect x="380" y="780" width="430" height="120" rx="12" ry="12"
        fill="#FFFFFF" stroke="#0B3D91" stroke-width="2.2"/>
  <text x="595" y="830" text-anchor="middle" font-size="24" font-weight="bold" fill="#0B3D91">Cliente MCP</text>
  <text x="595" y="862" text-anchor="middle" font-size="16" fill="#0B3D91">Claude Code, Cursor, Windsurf…</text>

  <!-- Dashboard HTML -->
  <g>
    <path d="M925 290 L985 290 L1005 310 L1140 310 L1140 430 L925 430 Z"
          fill="#FFFFFF" stroke="#0B3D91" stroke-width="2"/>
    <text x="1032" y="358" text-anchor="middle" font-size="22" font-weight="bold" fill="#0B3D91">Dashboard HTML</text>
    <text x="1032" y="385" text-anchor="middle" font-size="14" fill="#0B3D91">PNG + HTML</text>
    <text x="1032" y="405" text-anchor="middle" font-size="14" fill="#0B3D91">interativo (local)</text>
  </g>

  <!-- ===== FRONTEIRA ===== -->
  <rect x="1230" y="160" width="220" height="840" rx="20" ry="20"
        fill="#DFF1E0" stroke="#1E7A3C" stroke-width="4" stroke-dasharray="14,8"/>
  <text x="1340" y="240" text-anchor="middle" font-size="26" font-weight="bold" fill="#1E7A3C">FRONTEIRA</text>
  <line x1="1260" y1="265" x2="1420" y2="265" stroke="#1E7A3C" stroke-width="1.5"/>
  <text x="1340" y="320" text-anchor="middle" font-size="18" font-weight="bold" fill="#1E7A3C">Os dados</text>
  <text x="1340" y="345" text-anchor="middle" font-size="18" font-weight="bold" fill="#1E7A3C">NUNCA</text>
  <text x="1340" y="370" text-anchor="middle" font-size="18" font-weight="bold" fill="#1E7A3C">cruzam</text>
  <text x="1340" y="395" text-anchor="middle" font-size="18" font-weight="bold" fill="#1E7A3C">esta linha</text>

  <!-- O que atravessa -->
  <g transform="translate(1255, 700)">
    <rect x="0" y="0" width="170" height="240" rx="10" ry="10"
          fill="#FFFFFF" stroke="#1E7A3C" stroke-width="1.5"/>
    <text x="85" y="32" text-anchor="middle" font-size="14" font-weight="bold" fill="#1E7A3C">O que atravessa:</text>
    <line x1="15" y1="46" x2="155" y2="46" stroke="#1E7A3C" stroke-width="1"/>
    <text x="85" y="78" text-anchor="middle" font-size="13" fill="#1E7A3C">✓ schema</text>
    <text x="85" y="102" text-anchor="middle" font-size="13" fill="#1E7A3C">✓ nomes de colunas</text>
    <text x="85" y="126" text-anchor="middle" font-size="13" fill="#1E7A3C">✓ tipos / nulos</text>
    <text x="85" y="150" text-anchor="middle" font-size="13" fill="#1E7A3C">✓ código gerado</text>
    <line x1="15" y1="166" x2="155" y2="166" stroke="#1E7A3C" stroke-width="1"/>
    <text x="85" y="190" text-anchor="middle" font-size="13" font-weight="bold" fill="#B00020">✗ valores reais</text>
    <text x="85" y="212" text-anchor="middle" font-size="13" font-weight="bold" fill="#B00020">✗ linhas do CSV</text>
    <text x="85" y="232" text-anchor="middle" font-size="13" font-weight="bold" fill="#B00020">✗ PII</text>
  </g>

  <!-- ===== TERRITÓRIO 2 — NUVEM ===== -->
  <rect x="1500" y="140" width="380" height="880" rx="18" ry="18"
        fill="#F2F2F2" stroke="#888888" stroke-width="3" stroke-dasharray="10,6"/>
  <text x="1850" y="180" text-anchor="end" font-size="24" font-weight="bold" fill="#666666">NUVEM</text>

  <!-- LLM -->
  <rect x="1560" y="480" width="260" height="180" rx="14" ry="14"
        fill="#FFFFFF" stroke="#555555" stroke-width="2.5"/>
  <text x="1690" y="555" text-anchor="middle" font-size="32" font-weight="bold" fill="#333333">LLM</text>
  <text x="1690" y="600" text-anchor="middle" font-size="16" fill="#555555">Claude · GPT · Gemini</text>
  <text x="1690" y="625" text-anchor="middle" font-size="14" fill="#555555">(no cliente do usuário)</text>

  <!-- ===== SETAS NUMERADAS ===== -->

  <!-- (1) CSV → extrair_schema -->
  <line x1="215" y1="300" x2="295" y2="330"
        stroke="#0B3D91" stroke-width="2.5" marker-end="url(#arrow-blue)"/>
  <circle cx="250" cy="295" r="16" fill="#0B3D91"/>
  <text x="250" y="302" text-anchor="middle" font-size="18" font-weight="bold" fill="#FFFFFF">1</text>
  <text x="180" y="240" font-size="16" fill="#0B3D91" font-weight="bold">carregar dataset</text>

  <!-- (2) MCP → Cliente MCP -->
  <line x1="425" y1="370" x2="500" y2="780"
        stroke="#0B3D91" stroke-width="2.5" marker-end="url(#arrow-blue)"/>
  <circle cx="463" cy="575" r="16" fill="#0B3D91"/>
  <text x="463" y="582" text-anchor="middle" font-size="18" font-weight="bold" fill="#FFFFFF">2</text>
  <text x="365" y="740" font-size="16" fill="#0B3D91" font-weight="bold">schema + colunas PII</text>

  <!-- (3) Cliente MCP → LLM -->
  <line x1="810" y1="820" x2="1560" y2="540"
        stroke="#0B3D91" stroke-width="3" marker-end="url(#arrow-blue)"/>
  <circle cx="1185" cy="680" r="18" fill="#0B3D91"/>
  <text x="1185" y="687" text-anchor="middle" font-size="18" font-weight="bold" fill="#FFFFFF">3</text>
  <text x="850" y="820" font-size="16" fill="#0B3D91" font-weight="bold">schema + pergunta</text>

  <!-- (4) LLM → Cliente MCP -->
  <line x1="1560" y1="600" x2="810" y2="880"
        stroke="#0B3D91" stroke-width="3" marker-end="url(#arrow-blue)"/>
  <circle cx="1185" cy="740" r="18" fill="#0B3D91"/>
  <text x="1185" y="747" text-anchor="middle" font-size="18" font-weight="bold" fill="#FFFFFF">4</text>
  <text x="850" y="970" font-size="16" fill="#0B3D91" font-weight="bold">código Python gerado</text>

  <!-- (5) Cliente MCP → executar_código -->
  <line x1="725" y1="780" x2="725" y2="580"
        stroke="#0B3D91" stroke-width="2.5" marker-end="url(#arrow-blue)"/>
  <circle cx="725" cy="680" r="16" fill="#0B3D91"/>
  <text x="725" y="687" text-anchor="middle" font-size="18" font-weight="bold" fill="#FFFFFF">5</text>
  <text x="760" y="685" font-size="16" fill="#0B3D91" font-weight="bold">executar código</text>

  <!-- (6) executar → validar (interna, verde) -->
  <line x1="605" y1="535" x2="545" y2="535"
        stroke="#1E7A3C" stroke-width="3.5" marker-end="url(#arrow-green)"/>
  <circle cx="575" cy="500" r="16" fill="#1E7A3C"/>
  <text x="575" y="507" text-anchor="middle" font-size="18" font-weight="bold" fill="#FFFFFF">6</text>
  <text x="490" y="475" font-size="16" fill="#1E7A3C" font-weight="bold">validar AST</text>

  <!-- (7) executar_código → Dashboard -->
  <line x1="845" y1="500" x2="925" y2="370"
        stroke="#0B3D91" stroke-width="2.5" marker-end="url(#arrow-blue)"/>
  <circle cx="900" cy="410" r="16" fill="#0B3D91"/>
  <text x="900" y="417" text-anchor="middle" font-size="18" font-weight="bold" fill="#FFFFFF">7</text>
  <text x="870" y="475" font-size="16" fill="#0B3D91" font-weight="bold">PNG + HTML</text>

  <!-- ===== ANOTAÇÕES ===== -->

  <!-- Nota 1: Só ESTRUTURA -->
  <g>
    <path d="M60 470 L320 470 L320 600 L60 600 Z"
          fill="#FFFAE0" stroke="#1E7A3C" stroke-width="1.8"/>
    <path d="M60 470 L60 480 L70 470 Z" fill="#E8E0B0" stroke="#1E7A3C" stroke-width="1.8"/>
    <text x="190" y="500" text-anchor="middle" font-size="16" font-weight="bold" fill="#1E7A3C">Só ESTRUTURA</text>
    <text x="190" y="522" text-anchor="middle" font-size="16" font-weight="bold" fill="#1E7A3C">atravessa a fronteira</text>
    <text x="190" y="552" text-anchor="middle" font-size="14" fill="#1E7A3C">nomes de colunas e tipos.</text>
    <text x="190" y="572" text-anchor="middle" font-size="14" fill="#1E7A3C">Nenhum valor real sai.</text>
  </g>
  <!-- Nota 2: Bloqueia código perigoso -->
  <g>
    <path d="M60 680 L320 680 L320 850 L60 850 Z"
          fill="#FFFAE0" stroke="#1E7A3C" stroke-width="1.8"/>
    <path d="M60 680 L60 690 L70 680 Z" fill="#E8E0B0" stroke="#1E7A3C" stroke-width="1.8"/>
    <text x="190" y="712" text-anchor="middle" font-size="16" font-weight="bold" fill="#1E7A3C">Bloqueia código</text>
    <text x="190" y="734" text-anchor="middle" font-size="16" font-weight="bold" fill="#1E7A3C">perigoso</text>
    <line x1="80" y1="748" x2="300" y2="748" stroke="#1E7A3C" stroke-width="1"/>
    <text x="190" y="772" text-anchor="middle" font-size="14" fill="#1E7A3C">import os, eval, open,</text>
    <text x="190" y="792" text-anchor="middle" font-size="14" fill="#1E7A3C">requests, subprocess,</text>
    <text x="190" y="812" text-anchor="middle" font-size="14" fill="#1E7A3C">__class__.__bases__,</text>
    <text x="190" y="832" text-anchor="middle" font-size="14" fill="#1E7A3C">getattr/setattr…</text>
  </g>
  <line x1="320" y1="720" x2="305" y2="535"
        stroke="#1E7A3C" stroke-width="1.5" stroke-dasharray="5,5" opacity="0.7"/>

  <!-- ===== LEGENDA ===== -->
  <g transform="translate(680, 1015)">
    <rect x="0" y="0" width="18" height="18" fill="#0B3D91"/>
    <text x="28" y="14" font-size="14" fill="#333333">Fluxo de dados/controle</text>
    <rect x="220" y="0" width="18" height="18" fill="#1E7A3C"/>
    <text x="248" y="14" font-size="14" fill="#333333">Validação de segurança</text>
    <line x1="440" y1="9" x2="460" y2="9" stroke="#1E7A3C" stroke-width="2" stroke-dasharray="5,5"/>
    <text x="465" y="14" font-size="14" fill="#333333">Anotações didáticas</text>
  </g>
</svg>
